<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carrousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="carousel">
    <div class="slides">
        <img src="https://picsum.photos/800/400?1" class="slide active">
        <img src="https://picsum.photos/800/400?2" class="slide">
        <img src="https://picsum.photos/800/400?3" class="slide">
    </div>

    <button class="prev">⟨</button>
    <button class="next">⟩</button>
</div>

<script src="script.js"></script>

</body>
</html>
